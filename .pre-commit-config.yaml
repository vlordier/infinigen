repos:
- repo: local
  hooks:
    - id: pyupgrade
      name: pyupgrade
      entry: env INFINIGEN_MINIMAL_INSTALL=True uv run pyupgrade --py311-plus
      language: system
      types: [python]
    # Run the linter.
    - id: ruff
      name: ruff
      entry: env INFINIGEN_MINIMAL_INSTALL=True uv run ruff check --fix
      language: system
      types: [python]
    # Sort imports
    - id: ruff-import-sort
      name: ruff import sort
      entry: env INFINIGEN_MINIMAL_INSTALL=True uv run ruff check --select I --fix
      language: system
      types: [python]
    # Run the formatter.
    - id: ruff-format
      name: ruff format
      entry: env INFINIGEN_MINIMAL_INSTALL=True uv run ruff format
      language: system
      types: [python]
