name: Benchmarks

on:
  pull_request:
    branches:
      - main
      - develop*

concurrency:
  group: benchmarks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  INFINIGEN_INSTALL_TERRAIN: "False"
  INFINIGEN_INSTALL_CUSTOMGT: "False"

permissions:
  pull-requests: write
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: pr-branch
          fetch-depth: 0

      - name: Checkout upstream main (Princeton)
        uses: actions/checkout@v4
        with:
          repository: princeton-vl/infinigen
          ref: main
          path: upstream-main

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        run: |
          uv pip install pytest numpy scipy opencv-python-headless torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run PR branch benchmarks
        id: pr_bench
        working-directory: pr-branch
        run: |
          python tests/run_benchmarks.py --output /tmp/pr_results.json

      - name: Run upstream benchmarks
        id: upstream_bench
        working-directory: upstream-main
        run: |
          # The upstream may not have our benchmark runner, use the PR's version
          cp ../pr-branch/tests/run_benchmarks.py /tmp/run_benchmarks_upstream.py
          python /tmp/run_benchmarks_upstream.py --output /tmp/upstream_results.json --upstream

      - name: Generate comparison report
        id: report
        working-directory: pr-branch
        run: |
          python tests/compare_benchmarks.py \
            --pr /tmp/pr_results.json \
            --upstream /tmp/upstream_results.json \
            --output /tmp/benchmark_report.md

      - name: Post PR comment with benchmark results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/benchmark_report.md', 'utf8');

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- benchmark-results -->';
            const body = `${marker}\n${report}`;
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
