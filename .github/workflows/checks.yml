
name: Lint & Test

on:
  pull_request:
    branches:
    - main
    - develop*
  push:
    branches:
    - main
    - develop*

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  INFINIGEN_INSTALL_TERRAIN: False
  INFINIGEN_INSTALL_CUSTOMGT: False

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Lint with ruff
        run: |
          uv pip install 'ruff<0.9.0'
          ruff check --output-format=github .

      - name: Check for copyright statements
        run: |
          ruff check --output-format=github --preview --select CPY001 .

  test-bpy-free:
    name: Tests (bpy-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies (no bpy)
        run: |
          uv pip install pytest numpy scipy opencv-python-headless torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Test non-regression suite
        run: |
          pytest tests/test_nonregression.py --noconftest -v

      - name: Test benchmarks suite
        run: |
          pytest tests/test_benchmarks.py --noconftest -v

  test-bpy:
    name: Tests (bpy-dependent)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install infinigen with bpy
        id: install
        run: |
          uv pip install -e ".[dev]" --extra-index-url https://download.blender.org/pypi/bpy/

      - name: Test with pytest (bpy-dependent)
        if: steps.install.outcome == 'success'
        run: |
          pytest tests -k 'not skip_for_ci' --ignore=tests/test_nonregression.py --ignore=tests/test_benchmarks.py
