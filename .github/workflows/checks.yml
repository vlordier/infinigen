name: Lint & Test

on:
  pull_request:
    branches:
    - main
    - develop*
  push:
    branches:
    - main
    - develop*

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  INFINIGEN_INSTALL_TERRAIN: False
  INFINIGEN_INSTALL_CUSTOMGT: False

permissions:
  contents: read

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Lint with ruff
        run: |
          uv pip install "ruff<0.9.0"
          ruff check --output-format=github .

      - name: Check for copyright statements
        run: |
          ruff check --output-format=github --preview --select CPY001 .

  test-bpy-free:
    name: Tests (bpy-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies (no bpy)
        run: |
          uv pip install pytest pytest-cov gin-config numpy scipy opencv-python-headless torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Add repository root to PYTHONPATH
        run: |
          echo "PYTHONPATH=${GITHUB_WORKSPACE}:${PYTHONPATH}" >> "$GITHUB_ENV"

      - name: Run focused health checks with coverage
        run: |
          pytest --noconftest --maxfail=1 tests/test_repo_health.py \
            --cov=infinigen.core.tags \
            --cov=infinigen.datagen.util.submitit_emulator \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Test non-regression suite
        run: |
          pytest tests/test_nonregression.py --noconftest --maxfail=1 -v

      - name: Test benchmarks suite
        run: |
          pytest tests/test_benchmarks.py --noconftest --maxfail=1 -v

      - name: Test new features (bpy-free)
        run: |
          pytest tests/test_new_features.py --noconftest --maxfail=1 -v

  test-bpy:
    name: Tests (bpy-dependent)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install infinigen with bpy
        id: install
        continue-on-error: true
        run: |
          uv pip install -e ".[dev]" --extra-index-url https://download.blender.org/pypi/

      - name: Skip bpy-dependent tests when bpy wheel is unavailable
        if: steps.install.outcome != 'success'
        run: |
          echo "Skipping bpy-dependent tests because bpy installation is unavailable on this runner."

      - name: Test with pytest (bpy-dependent)
        if: steps.install.outcome == 'success'
        run: |
          pytest --maxfail=1 tests -k 'not skip_for_ci' --ignore=tests/test_nonregression.py --ignore=tests/test_benchmarks.py

  # ---------------------------------------------------------------------------
  # Cross-platform tests: verify bpy 5.0.1 installs and core API works on
  # each supported platform / compute backend.
  #
  #  • ubuntu-latest  → Linux x86_64 (CPU; CUDA requires a self-hosted runner)
  #  • macos-latest   → macOS ARM64 / Apple Silicon (MPS-capable hardware)
  #
  # The INFINIGEN_TORCH_DEVICE variable pins the PyTorch backend so the device
  # selection helpers in infinigen/core/util/device.py are exercised explicitly.
  # ---------------------------------------------------------------------------
  test-platforms:
    name: Test on ${{ matrix.os }} (${{ matrix.compute }})
    runs-on: ${{ matrix.os }}
    # continue-on-error: bpy 5.0.1 wheels may not yet be available on all
    # platforms via the Blender PyPI index; failures here are informational
    # until the wheel set stabilises.
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 – CPU compute (standard GitHub runner)
          - os: ubuntu-latest
            compute: cpu
            INFINIGEN_TORCH_DEVICE: cpu

          # macOS ARM64 (Apple Silicon) – MPS-capable host; MPS may or may not
          # be available inside the runner VM, so we request it but allow
          # graceful fallback to CPU if MPS is absent.
          - os: macos-latest
            compute: mps
            INFINIGEN_TORCH_DEVICE: mps

    env:
      INFINIGEN_TORCH_DEVICE: ${{ matrix.INFINIGEN_TORCH_DEVICE }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install infinigen with bpy
        id: install
        continue-on-error: true
        run: |
          uv pip install -e ".[dev]" --extra-index-url https://download.blender.org/pypi/

      - name: Install torch (CPU wheel on Linux, default on macOS)
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            uv pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          else
            uv pip install torch
          fi

      - name: Test Blender version compatibility
        if: steps.install.outcome == 'success'
        run: |
          pytest tests/test_blender_version_compatibility.py -v

      - name: Test compute device utilities (CUDA/MPS/CPU)
        if: steps.install.outcome == 'success'
        run: |
          pytest tests/test_benchmarks.py -k 'TestDeviceUtility' -v --noconftest

      - name: Skip platform bpy tests when bpy wheel is unavailable
        if: steps.install.outcome != 'success'
        run: |
          echo "Skipping platform bpy tests because bpy installation is unavailable on this runner."
