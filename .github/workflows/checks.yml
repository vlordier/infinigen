
name: Lint & Test

on:
  pull_request:
    branches:
    - main
    - develop*
  push:
    branches:
    - main
    - develop*

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  INFINIGEN_INSTALL_TERRAIN: False
  INFINIGEN_INSTALL_CUSTOMGT: False

jobs:

  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          python -m pip install uv

      - name: Install infinigen & dependencies
        run: |
          INFINIGEN_MINIMAL_INSTALL=True uv sync --frozen --extra dev

      - name: Lint with ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          uv run ruff check --output-format=github --select=E9,F63,F7,F82 .
          # default set of ruff rules with GitHub Annotations
          uv run ruff check --output-format=github .

      - name: Test with pytest
        run: |
          uv run pytest tests -k 'not skip_for_ci'

      - name: Check for copyright statements
        run: |
          uv run ruff check --output-format=github --preview --select CPY001 .
