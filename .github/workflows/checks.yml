
name: Lint & Test

on:
  pull_request:
    branches:
    - main
    - develop*
  push:
    branches:
    - main
    - develop*

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  INFINIGEN_INSTALL_TERRAIN: False
  INFINIGEN_INSTALL_CUSTOMGT: False

jobs:

  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Lint with ruff (Python 3.11 stringent – rules in pyproject.toml)
        run: |
          uv pip install "ruff<0.9.0"
          ruff check --output-format=github .

      - name: Install infinigen & dependencies
        run: |
          uv pip install --extra-index-url https://download.blender.org/pypi/bpy/ -e ".[dev]"

      - name: Run focused health checks with coverage
        run: |
          pytest --noconftest --maxfail=1 tests/test_repo_health.py \
            --cov=infinigen.core.tags \
            --cov=infinigen.datagen.util.submitit_emulator \
            --cov-report=term-missing \
            --cov-report=xml
      
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Test with pytest
        run: |
          pytest --maxfail=1 tests -k 'not skip_for_ci'

      - name: Check for copyright statements
        run: |
          ruff check --output-format=github --preview --select CPY001 .
